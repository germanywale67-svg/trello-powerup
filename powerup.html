<!DOCTYPE html>
<html>
<head>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
TrelloPowerUp.initialize({
  'card-buttons': function(t) {
    return [{
      text: 'Send to Jira',
      callback: function(t) {

        return t.card('id', 'name')
          .then(function(card) {

            return fetch('https://n8n.boostdy.online/webhook/trello-jira', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                card_id: card.id,
                card_name: card.name
              })
            });

          })
          .then(function() {
            return t.popup({
              title: "Success",
              items: [{
                text: "Sent to Jira ✅",
                callback: function(t) { return t.closePopup(); }
              }]
            });
          })
          .catch(function() {
            return t.popup({
              title: "Error",
              items: [{
                text: "Failed ❌",
                callback: function(t) { return t.closePopup(); }
              }]
            });
          });

      }
    }];
  }
});
</script>
</body>
</html>
